<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pac-Man Lab | Jose Pupiales</title>
    <style>
        body { background: #0d1117; color: white; text-align: center; font-family: sans-serif; }
        canvas { border: 2px solid #58a6ff; background: black; margin-top: 20px; }
        .back-btn { display: inline-block; margin-top: 20px; color: #58a6ff; text-decoration: none; border: 1px solid #58a6ff; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Laboratorio: Pac-Man JS</h1>
    <p>Usa las flechas para moverte (Demo técnica)</p>
    
    <!-- Aquí iría la lógica del juego, por ahora un canvas de prueba -->
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <br>
    <a href="index.html" class="back-btn">← Volver al Portafolio</a>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        // Dibujamos un Pac-Man estático para probar que carga
        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(200, 200, 50, 0.2 * Math.PI, 1.8 * Math.PI);
        ctx.lineTo(200, 200);
        ctx.fill();
    </script>
</body>
</html>
